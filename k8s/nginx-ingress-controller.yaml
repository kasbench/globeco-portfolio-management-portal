---
# Namespace for NGINX Ingress Controller
apiVersion: v1
kind: Namespace
metadata:
  name: ingress-nginx
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/instance: ingress-nginx

---
# ServiceAccount for NGINX Ingress Controller
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: ingress-nginx
    app.kubernetes.io/name: ingress-nginx
  name: ingress-nginx
  namespace: ingress-nginx
automountServiceAccountToken: true

---
# ConfigMap for NGINX Ingress Controller with metrics enabled
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: ingress-nginx
    app.kubernetes.io/name: ingress-nginx
  name: ingress-nginx-controller
  namespace: ingress-nginx
data:
  # Enable metrics collection
  enable-vts-status: "true"
  vts-status-zone-size: "10m"
  # Enable detailed request metrics
  log-format-escape-json: "true"
  # Additional metrics configuration
  server-tokens: "false"
  allow-snippet-annotations: "false"
  # CRITICAL: Disable buffering to prevent 5-second delays
  proxy-buffering: "off"
  proxy-request-buffering: "off"
  proxy-max-temp-file-size: "0"
  # Reduce timeouts for faster responses
  proxy-connect-timeout: "10"
  proxy-send-timeout: "60"
  proxy-read-timeout: "60"
  # Disable upstream buffering
  proxy-buffer-size: "4k"
  proxy-buffers: "8 4k"
  # Additional performance optimizations
  keepalive-timeout: "75"
  keepalive-requests: "100"

---

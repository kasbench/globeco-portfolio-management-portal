# Prometheus configuration for NGINX metrics scraping
# Add this to your prometheus.yml configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # NGINX Ingress Controller metrics
  - job_name: 'nginx-ingress-controller'
    kubernetes_sd_configs:
      - role: service
        namespaces:
          names:
            - globeco
            - ingress-nginx
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_service_name]
        action: replace
        target_label: service
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace

  # NGINX Exporter metrics
  - job_name: 'nginx-exporter'
    kubernetes_sd_configs:
      - role: service
        namespaces:
          names:
            - globeco
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_service_name]
        action: replace
        target_label: service
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace

  # Application metrics (your existing setup)
  - job_name: 'globeco-portfolio-app'
    kubernetes_sd_configs:
      - role: service
        namespaces:
          names:
            - globeco
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_name]
        action: keep
        regex: globeco-portfolio-management-portal
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
apiVersion: apps/v1
kind: Deployment
metadata:
  name: globeco-portfolio-management-portal
  namespace: globeco
  labels:
    app: globeco-portfolio-management-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: globeco-portfolio-management-portal
  template:
    metadata:
      labels:
        app: globeco-portfolio-management-portal
        version: v0.1.0
    spec:
      # Force pod to run on the node that globeco.local points to
      # You'll need to determine which node globeco.local resolves to
      # nodeSelector:
      #   kubernetes.io/hostname: node-0  # Change this to the correct node
      # Alternative: Use node affinity for more flexibility
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #       - matchExpressions:
      #         - key: kubernetes.io/hostname
      #           operator: In
      #           values:
      #           - node-0  # The node globeco.local points to
      containers:
        - name: globeco-portfolio-management-portal
          image: kasbench/globeco-portfolio-management-portal:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            # [Keep all your existing environment variables from the original deployment]
            - name: OTEL_SERVICE_NAME
              value: "globeco-portfolio-management-portal"
            - name: OTEL_SERVICE_VERSION
              value: "0.1.0"
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(NODE_IP):4318"
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: "http://$(NODE_IP):4318/v1/traces"
            - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
              value: "http://$(NODE_IP):4318/v1/metrics"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=globeco-portfolio-management-portal,service.version=0.1.0,deployment.environment=production,service.namespace=globeco"
            - name: OTEL_DEBUG
              value: "false"
            - name: OTEL_LOG_LEVEL
              value: "error"
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_METRIC_EXPORT_TIMEOUT
              value: "30000"
            - name: OTEL_TRACE_EXPORT_TIMEOUT
              value: "30000"
            - name: OTEL_ENABLE_AUTO_INSTRUMENTATION
              value: "true"
            - name: OTEL_ENABLE_CUSTOM_METRICS
              value: "true"
            - name: OTEL_ENABLE_CUSTOM_TRACING
              value: "true"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_PROPAGATORS
              value: "tracecontext,baggage,b3"
            - name: NODE_ENV
              value: "production"
            - name: NEXT_RUNTIME
              value: "nodejs"
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DATA_CLEANUP_EMPTY_PORTFOLIOS
              value: "false"
            - name: DATA_CLEANUP_EMPTY_REBALANCES
              value: "false"
            - name: ALLOCATION_SERVICE_HOST
              value: "globeco-allocation-service"
            - name: ALLOCATION_SERVICE_PORT
              value: "8089"
            - name: PORTFOLIO_SERVICE_HOST
              value: "globeco-portfolio-service"
            - name: PORTFOLIO_SERVICE_PORT
              value: "8000"
            - name: ORDER_GENERATION_SERVICE_HOST
              value: "globeco-order-generation-service"
            - name: ORDER_GENERATION_SERVICE_PORT
              value: "8088"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
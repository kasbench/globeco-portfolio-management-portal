# ConfigMap to enable NGINX Ingress Controller metrics
# Use this if you have an existing NGINX Ingress Controller installation
apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/component: controller
data:
  # Enable metrics collection - VTS (Virtual Host Traffic Status) module
  enable-vts-status: "true"
  vts-status-zone-size: "10m"
  # Enable detailed request metrics with JSON format
  log-format-escape-json: "true"
  # Additional security configuration
  server-tokens: "false"

# Note: For existing installations, the deploy.sh script will also apply
# kubectl patch commands to add port 10254 and --enable-metrics=true args.
# For fresh installations, use nginx-ingress-controller.yaml instead.
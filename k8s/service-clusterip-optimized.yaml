apiVersion: v1
kind: Service
metadata:
  name: globeco-portfolio-management-portal-optimized
  namespace: globeco
  labels:
    app: globeco-portfolio-management-portal
spec:
  type: ClusterIP
  # Optimize for performance
  sessionAffinity: None
  ipFamilyPolicy: SingleStack
  ipFamilies:
  - IPv4
  selector:
    app: globeco-portfolio-management-portal
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
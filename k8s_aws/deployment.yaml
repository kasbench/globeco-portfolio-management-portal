apiVersion: apps/v1
kind: Deployment
metadata:
  name: globeco-portfolio-management-portal
  namespace: globeco
  labels:
    app: globeco-portfolio-management-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: globeco-portfolio-management-portal
  template:
    metadata:
      labels:
        app: globeco-portfolio-management-portal
        version: v1.0.1
    spec:
      containers:
        - name: globeco-portfolio-management-portal
          image: kasbench/globeco-portfolio-management-portal:1.0.4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            # OpenTelemetry Configuration
            - name: OTEL_SERVICE_NAME
              value: "globeco-portfolio-management-portal"
            - name: OTEL_SERVICE_VERSION
              value: "0.1.0"
            # Inject the node IP from the Downward API
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            # Try HTTP endpoint first (port 4318)
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(NODE_IP):4318"
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: "http://$(NODE_IP):4318/v1/traces"
            - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
              value: "http://$(NODE_IP):4318/v1/metrics"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=globeco-portfolio-management-portal,service.version=0.1.0,deployment.environment=production,service.namespace=globeco"
            # Enable debug mode for better visibility
            - name: OTEL_DEBUG
              value: "false"
            - name: OTEL_LOG_LEVEL
              value: "error"
            # Additional OTLP configuration
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            # Metric export configuration
            # - name: OTEL_METRIC_EXPORT_INTERVAL
            #   value: "5000"
            - name: OTEL_METRIC_EXPORT_TIMEOUT
              value: "30000"
            - name: OTEL_TRACE_EXPORT_TIMEOUT
              value: "30000"
            # Feature flags
            - name: OTEL_ENABLE_AUTO_INSTRUMENTATION
              value: "true"
            - name: OTEL_ENABLE_CUSTOM_METRICS
              value: "true"
            - name: OTEL_ENABLE_CUSTOM_TRACING
              value: "true"
            # Additional debugging
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            # Trace context propagation configuration
            - name: OTEL_PROPAGATORS
              value: "tracecontext,baggage,b3"
            # Next.js configuration
            - name: NODE_ENV
              value: "production"
            - name: NEXT_RUNTIME
              value: "nodejs"
            # Hostname for service instance identification
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # Data Cleanup
            - name: DATA_CLEANUP_EMPTY_PORTFOLIOS
              value: "false"
            - name: DATA_CLEANUP_EMPTY_REBALANCES
              value: "false"
            # Backend services configuration
            - name: ALLOCATION_SERVICE_HOST
              value: "globeco-allocation-service"
            - name: ALLOCATION_SERVICE_PORT
              value: "8089"
            - name: PORTFOLIO_SERVICE_HOST
              value: "globeco-portfolio-service"
            - name: PORTFOLIO_SERVICE_PORT
              value: "8000"
            - name: ORDER_GENERATION_SERVICE_HOST
              value: "globeco-order-generation-service"
            - name: ORDER_GENERATION_SERVICE_PORT
              value: "8088"
            - name: ORDER_BATCH_SIZE
              value: "25"
            # API timeout configuration
            - name: NEXT_PUBLIC_API_TIMEOUT
              value: "15000"

          # Health checks that will generate telemetry data
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            # initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            # initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: "587m"
              memory: "200Mi"
            limits:
              cpu: "587m"
              memory: "200Mi" 